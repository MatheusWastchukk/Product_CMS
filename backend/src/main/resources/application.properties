spring.application.name=product-catalog-cms

spring.datasource.url=jdbc:postgresql://localhost:5432/aztech_db
spring.datasource.username=aztech_user
spring.datasource.password=admin

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.web.cors.allowed-origin-patterns=http://localhost:*,http://127.0.0.1:*

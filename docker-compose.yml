services:
  postgres:
    image: postgres:18-alpine
    container_name: aztech-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aztech_db}
      POSTGRES_USER: ${POSTGRES_USER:-aztech_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aztech_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aztech_user} -d ${POSTGRES_DB:-aztech_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: aztech-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: aztech-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-aztech_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-aztech_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-aztech_password}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "false"
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  audit-service:
    build:
      context: ./audit-service
    container_name: aztech-audit-service
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
    depends_on:
      rabbitmq:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: aztech-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres-data:
